<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 ADMIN - Championnat de Clôture</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="root"></div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD26jNyvIzWYNwfS97N27iZES-AFWVtIGc",
            authDomain: "championnat-football.firebaseapp.com",
            projectId: "championnat-football",
            storageBucket: "championnat-football.firebasestorage.app",
            messagingSenderId: "271329092716",
            appId: "1:271329092716:web:68e7ff9e0527f489c36449"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const AdminApp = () => {
            const [matches, setMatches] = useState([]);
            const [players, setPlayers] = useState([]);
            const [scorers, setScorers] = useState({});
            const [assists, setAssists] = useState({});
            const [loading, setLoading] = useState(true);
            const [selectedMatch, setSelectedMatch] = useState(null);
            const [selectedDate, setSelectedDate] = useState('');
            const [scoreRouges, setScoreRouges] = useState('');
            const [scoreBleus, setScoreBleus] = useState('');
            const [selectedTeam, setSelectedTeam] = useState('rouges');
            const [selectedScorer, setSelectedScorer] = useState('');
            const [selectedAssist, setSelectedAssist] = useState('');
            const [newPlayerName, setNewPlayerName] = useState('');
            const [goalsRouges, setGoalsRouges] = useState([]);
            const [goalsBleus, setGoalsBleus] = useState([]);
            const [saving, setSaving] = useState(false);

            const championshipDates = [
                '2026-04-22', '2026-04-24', '2026-04-25', '2026-04-29',
                '2026-05-01', '2026-05-02', '2026-05-06', '2026-05-08', '2026-05-09',
                '2026-05-13', '2026-05-15', '2026-05-16', '2026-05-20', '2026-05-22',
                '2026-05-23', '2026-05-27', '2026-05-29', '2026-05-30'
            ];

            useEffect(() => {
                const unsubMatches = db.collection('cloture').doc('matches').onSnapshot((doc) => {
                    if (doc.exists) setMatches(doc.data().data || []); else initializeData();
                });
                const unsubPlayers = db.collection('cloture').doc('players').onSnapshot((doc) => {
                    if (doc.exists) setPlayers(doc.data().data || []);
                });
                const unsubScorers = db.collection('cloture').doc('scorers').onSnapshot((doc) => {
                    if (doc.exists) setScorers(doc.data().data || {});
                });
                const unsubAssists = db.collection('cloture').doc('assists').onSnapshot((doc) => {
                    if (doc.exists) setAssists(doc.data().data || {});
                });
                setLoading(false);
                return () => { unsubMatches(); unsubPlayers(); unsubScorers(); unsubAssists(); };
            }, []);

            const initializeData = async () => {
                const initialMatches = championshipDates.map((dateStr, idx) => ({ journee: idx + 1, date: dateStr, scoreRouges: null, scoreBleus: null, goalsRouges: [], goalsBleus: [] }));
                await db.collection('cloture').doc('matches').set({ data: initialMatches });
                await db.collection('cloture').doc('players').set({ data: [] });
                await db.collection('cloture').doc('scorers').set({ data: {} });
                await db.collection('cloture').doc('assists').set({ data: {} });
            };

            const saveData = async (newMatches, newPlayers, newScorers, newAssists) => {
                try {
                    await db.collection('cloture').doc('matches').set({ data: newMatches });
                    await db.collection('cloture').doc('players').set({ data: newPlayers });
                    await db.collection('cloture').doc('scorers').set({ data: newScorers });
                    await db.collection('cloture').doc('assists').set({ data: newAssists });
                } catch (error) { alert('Erreur de sauvegarde'); }
            };

            const addPlayer = async () => {
                if (newPlayerName.trim() && !players.includes(newPlayerName.trim())) {
                    const updatedPlayers = [...players, newPlayerName.trim()].sort();
                    setPlayers(updatedPlayers);
                    await saveData(matches, updatedPlayers, scorers, assists);
                    setNewPlayerName(''); alert('Joueur ajouté !');
                }
            };

            const addGoal = () => {
                if (!selectedScorer) { alert('Sélectionnez un buteur'); return; }
                const goal = { scorer: selectedScorer, assist: selectedAssist || 'Aucune' };
                if (selectedTeam === 'rouges') setGoalsRouges([...goalsRouges, goal]);
                else setGoalsBleus([...goalsBleus, goal]);
                setSelectedScorer(''); setSelectedAssist('');
            };

            const removeGoal = (team, index) => {
                if (team === 'rouges') setGoalsRouges(goalsRouges.filter((_, i) => i !== index));
                else setGoalsBleus(goalsBleus.filter((_, i) => i !== index));
            };

            const handleSaveMatch = async () => {
                if (!selectedMatch || scoreRouges === '' || scoreBleus === '') { alert('Remplir tous les champs'); return; }
                if (parseInt(scoreRouges) !== goalsRouges.length || parseInt(scoreBleus) !== goalsBleus.length) {
                    alert(`Le nombre de buts ne correspond pas !\nRouges: ${goalsRouges.length}/${scoreRouges} - Bleus: ${goalsBleus.length}/${scoreBleus}`);
                    return;
                }
                setSaving(true);
                const updatedMatches = [...matches];
                const matchIndex = matches.findIndex(m => m.journee === selectedMatch.journee);
                updatedMatches[matchIndex] = { ...selectedMatch, date: selectedDate, scoreRouges: parseInt(scoreRouges), scoreBleus: parseInt(scoreBleus), goalsRouges: [...goalsRouges], goalsBleus: [...goalsBleus] };

                const updatedScorers = { ...scorers };
                const updatedAssists = { ...assists };
                [...goalsRouges, ...goalsBleus].forEach(goal => {
                    updatedScorers[goal.scorer] = (updatedScorers[goal.scorer] || 0) + 1;
                    if (goal.assist !== 'Aucune') updatedAssists[goal.assist] = (updatedAssists[goal.assist] || 0) + 1;
                });
                setScorers(updatedScorers); setAssists(updatedAssists);
                await saveData(updatedMatches, players, updatedScorers, updatedAssists);
                setMatches(updatedMatches); resetForm(); setSaving(false); alert('Match enregistré !');
            };

            const resetForm = () => { setSelectedMatch(null); setSelectedDate(''); setScoreRouges(''); setScoreBleus(''); setGoalsRouges([]); setGoalsBleus([]); setSelectedScorer(''); setSelectedAssist(''); };

            const handleMatchSelect = (e) => {
                const value = e.target.value;
                if (!value) { resetForm(); return; }
                const match = matches.find(m => m.journee === parseInt(value));
                if (match) {
                    setSelectedMatch(match);
                    setSelectedDate(match.date || '');
                    setScoreRouges(match.scoreRouges !== null ? String(match.scoreRouges) : '');
                    setScoreBleus(match.scoreBleus !== null ? String(match.scoreBleus) : '');
                    setGoalsRouges(match.goalsRouges || []);
                    setGoalsBleus(match.goalsBleus || []);
                }
            };

            const handleDateChange = (e) => {
                const newDate = e.target.value;
                setSelectedDate(newDate);
                if (selectedMatch) setSelectedMatch({ ...selectedMatch, date: newDate });
            };

            const handleResetData = async () => {
                if (window.confirm('⚠️ Réinitialiser TOUT ?')) {
                    const initialMatches = championshipDates.map((dateStr, idx) => ({ journee: idx + 1, date: dateStr, scoreRouges: null, scoreBleus: null, goalsRouges: [], goalsBleus: [] }));
                    setMatches(initialMatches); setPlayers([]); setScorers({}); setAssists({});
                    await saveData(initialMatches, [], {}, {}); resetForm(); alert('Réinitialisé !');
                }
            };

            if (loading) return <div className="flex items-center justify-center h-screen bg-red-900 text-white text-xl">⚙️ Chargement...</div>;

            return (
                <div className="min-h-screen bg-gradient-to-br from-red-900 via-red-800 to-red-900 p-3">
                    <div className="max-w-4xl mx-auto">
                        <div className="bg-white rounded-lg shadow-xl p-3 mb-3">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-red-600 rounded-full"></div>
                                <div><h1 className="text-xl font-bold">🔒 ADMIN - Championnat de Clôture</h1><p className="text-xs text-gray-600">Rouges vs Bleus</p></div>
                            </div>
                        </div>
                        <div className="bg-white rounded-lg shadow-lg p-3 mb-3">
                            <h2 className="text-lg font-bold mb-2">👥 Joueurs</h2>
                            <div className="flex gap-2 mb-2">
                                <input type="text" className="flex-1 p-2 border rounded text-sm" placeholder="Nom du joueur" value={newPlayerName} onChange={(e) => setNewPlayerName(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && addPlayer()} />
                                <button onClick={addPlayer} className="bg-green-600 text-white px-3 py-2 rounded font-bold text-sm">➕</button>
                            </div>
                            <div className="bg-gray-50 p-2 rounded max-h-24 overflow-y-auto"><p className="font-semibold text-xs mb-1">Joueurs ({players.length}):</p><div className="flex flex-wrap gap-1">{players.map(p => <span key={p} className="bg-blue-100 text-blue-800 px-2 py-1 rounded-full text-xs">{p}</span>)}</div></div>
                        </div>
                        <div className="bg-white rounded-lg shadow-lg p-3 mb-3">
                            <h2 className="text-lg font-bold mb-2">⚽ Matchs</h2>
                            <select className="w-full p-2 border rounded text-sm mb-2" onChange={handleMatchSelect} value={selectedMatch?.journee || ''}>
                                <option value="">-- Sélectionner un match --</option>
                                {matches.map(match => (
                                    <option key={match.journee} value={match.journee}>
                                        J{match.journee} - {new Date(match.date + 'T12:00:00').toLocaleDateString('fr-FR')}
                                        {match.scoreRouges !== null ? ` (${match.scoreRouges}-${match.scoreBleus})` : ''}
                                    </option>
                                ))}
                            </select>
                            {selectedMatch && (
                                <div className="space-y-2">
                                    <div>
                                        <label className="block font-semibold text-xs mb-1 text-gray-700">📅 Date du match :</label>
                                        <input
                                            type="date"
                                            className="w-full p-2 border-2 border-gray-300 rounded text-sm"
                                            value={selectedDate}
                                            onChange={handleDateChange}
                                        />
                                        {selectedDate && (
                                            <p className="text-xs text-green-600 mt-1">
                                                ✅ {new Date(selectedDate + 'T12:00:00').toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}
                                            </p>
                                        )}
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div><label className="block font-semibold text-xs mb-1 text-red-600">Score Rouges:</label><input type="number" min="0" className="w-full p-2 border rounded text-sm" value={scoreRouges} onChange={(e) => setScoreRouges(e.target.value)} /></div>
                                        <div><label className="block font-semibold text-xs mb-1 text-blue-600">Score Bleus:</label><input type="number" min="0" className="w-full p-2 border rounded text-sm" value={scoreBleus} onChange={(e) => setScoreBleus(e.target.value)} /></div>
                                    </div>
                                    <div className="border-t pt-2">
                                        <h3 className="font-bold text-sm mb-1">Ajouter un but</h3>
                                        <div className="space-y-2">
                                            <select className="w-full p-2 border rounded text-sm" value={selectedTeam} onChange={(e) => setSelectedTeam(e.target.value)}>
                                                <option value="rouges">Équipe Rouges</option>
                                                <option value="bleus">Équipe Bleus</option>
                                            </select>
                                            <select className="w-full p-2 border rounded text-sm" value={selectedScorer} onChange={(e) => setSelectedScorer(e.target.value)}>
                                                <option value="">-- Buteur --</option>
                                                {players.map(p => <option key={p} value={p}>{p}</option>)}
                                            </select>
                                            <select className="w-full p-2 border rounded text-sm" value={selectedAssist} onChange={(e) => setSelectedAssist(e.target.value)}>
                                                <option value="">-- Passeur (optionnel) --</option>
                                                {players.map(p => <option key={p} value={p}>{p}</option>)}
                                            </select>
                                            <button onClick={addGoal} disabled={!selectedScorer} className="w-full bg-blue-600 text-white py-2 rounded font-bold text-sm disabled:bg-gray-300">➕ Ajouter ce but</button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="bg-red-50 p-2 rounded">
                                            <h4 className="font-bold text-red-700 text-xs mb-1">Buts Rouges ({goalsRouges.length})</h4>
                                            <div className="space-y-1">
                                                {goalsRouges.map((goal, i) => (
                                                    <div key={i} className="bg-white p-1 rounded text-xs flex justify-between items-start">
                                                        <div>
                                                            <div>⚽ <strong>{goal.scorer}</strong></div>
                                                            {goal.assist !== 'Aucune' && <div className="text-gray-600">🎯 {goal.assist}</div>}
                                                        </div>
                                                        <button onClick={() => removeGoal('rouges', i)} className="text-red-600">❌</button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="bg-blue-50 p-2 rounded">
                                            <h4 className="font-bold text-blue-700 text-xs mb-1">Buts Bleus ({goalsBleus.length})</h4>
                                            <div className="space-y-1">
                                                {goalsBleus.map((goal, i) => (
                                                    <div key={i} className="bg-white p-1 rounded text-xs flex justify-between items-start">
                                                        <div>
                                                            <div>⚽ <strong>{goal.scorer}</strong></div>
                                                            {goal.assist !== 'Aucune' && <div className="text-gray-600">🎯 {goal.assist}</div>}
                                                        </div>
                                                        <button onClick={() => removeGoal('bleus', i)} className="text-blue-600">❌</button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={handleSaveMatch} disabled={saving} className="w-full bg-green-600 text-white py-3 rounded font-bold text-sm">{saving ? '💾 Enregistrement...' : '✅ Enregistrer le Match'}</button>
                                </div>
                            )}
                        </div>
                        <div className="bg-white rounded-lg shadow-lg p-3"><h3 className="font-bold text-red-600 mb-2 text-sm">⚠️ Zone Danger</h3><button onClick={handleResetData} className="bg-red-600 text-white px-3 py-2 rounded font-bold text-sm">🗑️ Réinitialiser tout</button></div>
                    </div>
                </div>
            );
        };
        ReactDOM.render(<AdminApp />, document.getElementById('root'));
    </script>
</body>
</html>
